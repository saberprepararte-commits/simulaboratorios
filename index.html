  <title>Simulaboratorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
:root {
  --ink: #13243a;
  --muted: #637083;
  --paper: #f6f8f3;
  --white: #ffffff;
  --teal: #087f73;
  --teal-dark: #056259;
  --lime: #d8ee74;
  --coral: #ff7a62;
  --line: #dfe5de;
  --shadow: 0 20px 60px rgba(20, 48, 58, 0.12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  color: var(--ink);
  background: var(--paper);
  font-family: "Manrope", sans-serif;
}

button,
input,
textarea,
select {
  font: inherit;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

.container {
  width: min(1120px, calc(100% - 40px));
  margin-inline: auto;
}

.hero {
  position: relative;
  min-height: 620px;
  overflow: hidden;
  color: white;
  background: #075f65;
}

.hero::after {
  position: absolute;
  z-index: 3;
  right: -5%;
  bottom: -135px;
  left: -5%;
  height: 190px;
  background: var(--paper);
  border-radius: 50% 50% 0 0;
  content: "";
}

.nav {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-block: 26px;
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 18px;
}

.language-picker {
  display: flex;
  height: 42px;
  padding: 0 10px;
  align-items: center;
